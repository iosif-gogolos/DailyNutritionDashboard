<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily nutrition & Hydration</title>
    <meta name="theme-color" content="#0b74ff">

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="AppIcon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container mt-4">
        <h2 class="mb-4">Nutrition Dashboard</h2>

        <!-- Dashboard cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-bg-primary">
                    <div class="card-body">
                        <h6>Hydration</h6>
                        <h2 id="hydrationTotal">0 ml</h2>
                        <small id="hydrationProgress"></small>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-bg-success">
                    <div class="card-body">
                        <h6>Activities</h6>
                        <h2 id="activityMinutes">0 min</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-bg-warning">
                    <div class="card-body">
                        <h6>Meals</h6>
                        <h2 id="mealCount">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-bg-dark">
                    <div class="card-body">
                        <h6>Sleep</h6>
                        <h2 id="sleepHours">0 h</h2>
                    </div>
                </div>
            </div>

        </div>

        <div class="upload-panel mb-4">
            <label class="form-label upload-label" for="csvFile">Upload CSV file</label>
            <div id="uploadZone" class="upload-zone" role="button" tabindex="0" aria-label="Upload CSV file">
                <input type="file" id="csvFile" class="visually-hidden" accept=".csv">
                <div class="upload-icon">CSV</div>
                <div>
                    <div class="upload-title">Drag and drop a CSV here</div>
                    <div class="upload-subtitle">or click to browse your files</div>
                </div>
                <div id="selectedFileName" class="upload-filename">No file selected</div>
            </div>
        </div>

        <!-- Table -->

        <div class="data-table-shell">
            <div class="table-responsive">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th class="col-favorite"><span class="header-icon">☆</span></th>
                            <th>Project</th>
                            <th>Title</th>
                            <th>Status</th>
                            <th>User</th>
                            <th>Users</th>
                            <th>Notes</th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
            </div>

            <div class="data-table-footer">
                <div id="tableMeta" class="table-meta"></div>
                <div id="tablePagination" class="table-pagination"></div>
            </div>
        </div>

    </div>

    <!-- date,time,type,item,amount,unit,notes-->

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(error => {
                    console.warn('Service worker registration failed:', error);
                });
            });
        }
    </script>
    <script src="script.js"></script>

</body>

</html>
